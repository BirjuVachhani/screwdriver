name: Code Quality

on:
  push:
    branches:
      - main
    paths:
      - '**.dart'
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Code Analysis
        run: dart analyze .
      - name: Code Formatting
        run: dart format --set-exit-if-changed .